version: 1
backend:
  phases:
    build:
      commands:
        # Deploy the Gen 2 backend (the chat Lambda + its Function URL).
        # Produces amplify_outputs.json with custom.chatApiUrl.
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # Read the deployed Function URL into the Vite build so advisor.js
        # points at the live relay. Falls back to '' (mock mode) if absent.
        - export VITE_API_BASE=$(node -p "require('./amplify_outputs.json').custom.chatApiUrl" 2>/dev/null || echo '')
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
